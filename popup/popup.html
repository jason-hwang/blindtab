<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlindTab</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header>
      <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17 11H7V8a5 5 0 0 1 10 0v3Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <rect x="5" y="11" width="14" height="10" rx="2.5" fill="currentColor" opacity="0.15"/>
        <rect x="5" y="11" width="14" height="10" rx="2.5" stroke="currentColor" stroke-width="1.8"/>
        <circle cx="12" cy="16" r="1.5" fill="currentColor"/>
      </svg>
      <h1>BlindTab</h1>
    </header>

    <div id="no-password-banner" class="banner hidden">
      <span data-i18n="noBannerText">⚠️ No password set.</span>
      <a id="go-options-banner" href="#" data-i18n="setUpNow">Set up now →</a>
    </div>

    <div class="url-section">
      <p class="label" data-i18n="currentPage">Current page</p>
      <p id="current-url" class="url-display">Loading…</p>
    </div>

    <button id="toggle-btn" class="toggle-btn" disabled>
      <span id="toggle-label">Loading…</span>
    </button>

    <div id="subpath-section" class="subpath-section hidden">
      <label id="subpath-label">
        <input type="checkbox" id="subpath-checkbox" />
        <span data-i18n="alsoLockSubpaths">Also lock subpaths</span>
      </label>
    </div>

    <div id="auth-section" class="auth-section hidden">
      <p class="auth-message" data-i18n="authMessage">Enter your password to remove protection.</p>
      <div class="auth-input-row">
        <input id="auth-password" type="password" autocomplete="current-password" spellcheck="false" />
        <button id="auth-confirm-btn" data-i18n="confirm">Confirm</button>
      </div>
      <p id="auth-error" class="auth-error"></p>
    </div>

    <footer>
      <a id="go-options" href="#" data-i18n="manageUrls">Manage all protected URLs →</a>
    </footer>
  </div>

  <script src="../shared/i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
